<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma - Os melhore Cafés Especiais</title>
    <!--Importação do Css-->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
     <header class="header">
        <div class="container">
            <!-- Navbar -->
            <div class="nav">
                <!-- Logo -->
                <div class="logo">Café Aroma</div>
                <!-- Menu -->
                <nav class="menu">
                    <a href="#inicio">Início</a>
                    <a href="#produtos">Produtos</a>
                    <a href="#Sobre">Sobre</a>
                    <a href="#contato">Contato</a>
                </nav>
            </div>
        </div>
     </header>

     <main>
        <!-- HERO SECTION -->
         <section class="hero">
         <div class="hero-content">
            <h1>Desperte Seus Sentidos</h1>
            <p>Cafés especiais selecionados para 
            você começar o dia com energia e sabor</p>
            <!-- Botão CTA - Call To Action -->
             <button class="btn-primary">
                Conheça Nossos Cafés
             </button>
         </div>
         </section>

         <section class="produtos" id="produtos">
            <div class="container">
                <h2 class="section-title">Nossos Cafés</h2>
                <div class="cards">
                    <div class="card">
                        <img src="COLAR AQUI IMAGEM 01" alt="Café Expresso">
                        <div class="card-content">
                            <h3>Expresso Intenso</h3>
                            <p>Sabor marcante e encorpado, perfeito para quem aprecia café forte</p>
                            <span clas="price">R$ 18,90</span>
                        </div>
                    </div>
                </div>

            </div>

         </section>

     </main>
</body>
</html>
